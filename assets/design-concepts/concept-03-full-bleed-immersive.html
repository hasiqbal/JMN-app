<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Concept 03 — Full Bleed Immersive</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 40px 20px;
    font-family: 'Inter', sans-serif;
  }
  .phone {
    width: 390px; height: 844px;
    border-radius: 48px; overflow: hidden; position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.08);
  }
  .fullbg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(20,80,60,0.95) 0%, transparent 55%),
      radial-gradient(ellipse at 100% 60%, rgba(5,30,25,0.8) 0%, transparent 50%),
      radial-gradient(ellipse at 0% 70%, rgba(8,40,35,0.7) 0%, transparent 50%),
      linear-gradient(180deg, #081F1A 0%, #0D3A30 25%, #124035 55%, #0A2824 80%, #061A15 100%);
  }
  .mosque-silhouette {
    position: absolute; bottom: 90px; left: 0; right: 0;
    height: 200px; opacity: 0.18;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 200"><path d="M0,200 L0,140 L30,140 L30,100 L50,100 L50,80 L65,80 L65,50 L68,30 L71,50 L71,80 L86,80 L86,100 L106,100 L106,140 L140,140 L140,120 L160,120 L160,90 L170,90 L170,60 L175,40 L180,20 L185,5 L190,20 L195,5 L200,20 L205,40 L210,60 L210,90 L220,90 L220,120 L240,120 L240,140 L270,140 L270,100 L290,100 L290,80 L305,80 L305,50 L308,30 L311,50 L311,80 L326,80 L326,100 L346,100 L346,140 L390,140 L390,200 Z" fill="white"/></svg>') no-repeat bottom center;
    background-size: cover;
  }
  .star-field {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 15%, rgba(255,255,255,0.6) 0px, transparent 1px),
      radial-gradient(circle at 80% 8%, rgba(255,255,255,0.5) 0px, transparent 1px),
      radial-gradient(circle at 45% 12%, rgba(255,255,255,0.4) 0px, transparent 1px),
      radial-gradient(circle at 70% 25%, rgba(255,255,255,0.35) 0px, transparent 1px),
      radial-gradient(circle at 15% 35%, rgba(255,255,255,0.3) 0px, transparent 1px),
      radial-gradient(circle at 90% 18%, rgba(255,255,255,0.45) 0px, transparent 1px),
      radial-gradient(circle at 60% 5%, rgba(255,255,255,0.5) 0px, transparent 1px);
    background-size: 390px 844px;
  }
  .overlay-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(5,15,12,0.96) 0%, rgba(5,15,12,0.5) 30%, transparent 60%);
  }
  .content {
    position: relative; z-index: 10;
    height: 100%; display: flex; flex-direction: column;
  }
  .top-bar {
    padding: 52px 28px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .masjid-group .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600;
    color: rgba(255,255,255,0.95);
    letter-spacing: 0.02em;
  }
  .masjid-group .loc {
    font-size: 13px; color: rgba(190,230,215,0.6);
    margin-top: 3px;
  }
  .update-chip {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border-radius: 20px; padding: 6px 14px;
    font-size: 12px; color: rgba(210,245,230,0.8);
  }
  .center-section {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 0 28px;
    margin-top: -40px;
  }
  .live-indicator {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 18px;
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #5DFFBA; box-shadow: 0 0 12px #5DFFBA;
    animation: glow 2s infinite;
  }
  @keyframes glow { 0%,100%{box-shadow:0 0 8px #5DFFBA} 50%{box-shadow:0 0 18px #5DFFBA, 0 0 30px rgba(93,255,186,0.4)} }
  .live-text {
    font-size: 14px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: #5DFFBA;
  }
  .clock {
    font-family: 'Inter', sans-serif;
    font-size: 108px; font-weight: 800;
    color: #FFFFFF; letter-spacing: -5px; line-height: 1;
    text-align: center;
  }
  .clock-sub {
    font-size: 28px; font-weight: 300;
    color: rgba(200,240,225,0.7); margin-left: 6px; vertical-align: middle;
  }
  .hijri {
    font-size: 16px; color: rgba(190,230,215,0.6);
    text-align: center; margin-top: 8px; font-weight: 300;
    letter-spacing: 0.03em;
  }
  .bottom-section {
    padding: 0 18px 100px;
  }
  .iqamah-panel {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(28px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 28px; padding: 24px 26px;
    margin-bottom: 14px;
  }
  .iq-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(140,220,185,0.75);
    margin-bottom: 10px;
  }
  .iq-countdown {
    font-family: 'Inter', sans-serif;
    font-size: 60px; font-weight: 800;
    color: #FFFFFF; letter-spacing: -2px; line-height: 1;
  }
  .iq-sub { font-size: 15px; color: rgba(190,230,215,0.55); margin-top: 5px; }
  .iq-separator {
    border: none; border-top: 1px solid rgba(255,255,255,0.08);
    margin: 16px 0;
  }
  .iq-next {
    display: flex; justify-content: space-between; align-items: center;
  }
  .iq-next-label { font-size: 13px; color: rgba(180,220,205,0.6); }
  .iq-next-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 600; color: #FFFFFF;
  }
  .iq-next-time { text-align: right; }
  .iq-athan { font-size: 28px; font-weight: 700; color: #FFFFFF; }
  .iq-iqamah-time { font-size: 13px; color: #5DFFBA; font-weight: 600; }
  .cta-row { display: flex; gap: 12px; margin-bottom: 14px; }
  .cta-btn {
    flex: 1; border-radius: 22px; padding: 18px 16px;
  }
  .cta-btn.solid {
    background: linear-gradient(135deg, #0E7A5F, #0B5E49);
    border: none;
  }
  .cta-btn.ghost {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .cta-tag {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(200,255,230,0.7);
    margin-bottom: 5px;
  }
  .cta-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 700; color: #FFFFFF;
  }
  .tab-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(5,18,14,0.9);
    backdrop-filter: blur(30px);
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 14px 0 28px;
    display: flex; z-index: 100;
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .tab-ic { font-size: 19px; }
  .tab-lbl { font-size: 11px; font-weight: 500; color: rgba(160,200,185,0.5); }
  .tab-item.active .tab-lbl { color: #5DFFBA; font-weight: 700; }
</style>
</head>
<body>
<div class="phone">
  <div class="fullbg"></div>
  <div class="star-field"></div>
  <div class="mosque-silhouette"></div>
  <div class="overlay-gradient"></div>
  <div class="content">
    <div class="top-bar">
      <div class="masjid-group">
        <div class="name">Jami' Masjid Noorani</div>
        <div class="loc">Halifax, UK</div>
      </div>
      <div class="update-chip">Updated 00:21</div>
    </div>
    <div class="center-section">
      <div class="live-indicator">
        <div class="live-dot"></div>
        <span class="live-text">Isha in progress</span>
      </div>
      <div class="clock">00:26<span class="clock-sub">AM</span></div>
      <div class="hijri">Thu 16 Apr &nbsp;·&nbsp; 27 Shawwāl 1447 AH</div>
    </div>
    <div class="bottom-section">
      <div class="iqamah-panel">
        <div class="iq-label">Live Iqamah Countdown</div>
        <div class="iq-countdown">03:14:54</div>
        <div class="iq-sub">Isha ends in 3 hrs 14 min</div>
        <hr class="iq-separator"/>
        <div class="iq-next">
          <div>
            <div class="iq-next-label">Coming up</div>
            <div class="iq-next-name">Fajr</div>
          </div>
          <div class="iq-next-time">
            <div class="iq-athan">03:41</div>
            <div class="iq-iqamah-time">Iqamah 05:15</div>
          </div>
        </div>
      </div>
      <div class="cta-row">
        <div class="cta-btn solid">
          <div class="cta-tag">Full Schedule</div>
          <div class="cta-title">Prayer Times</div>
        </div>
        <div class="cta-btn ghost">
          <div class="cta-tag">Priority Appeal</div>
          <div class="cta-title">Donate Now</div>
        </div>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab-item active"><div class="tab-ic">⌂</div><div class="tab-lbl">Home</div></div>
    <div class="tab-item"><div class="tab-ic">◷</div><div class="tab-lbl">Prayer</div></div>
    <div class="tab-item"><div class="tab-ic">☽</div><div class="tab-lbl">Duas</div></div>
    <div class="tab-item"><div class="tab-ic">📖</div><div class="tab-lbl">Quran</div></div>
    <div class="tab-item"><div class="tab-ic">▶</div><div class="tab-lbl">Live</div></div>
  </div>
</div>
</body>
</html>
